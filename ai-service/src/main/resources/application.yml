server:
  port: 8083

spring:
  application:
    name: ai-service
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
  
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:192.168.254.128}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:doc_ai}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 300000
      connection-timeout: 10000

  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      discovery:
        server-addr: 192.168.254.128:8848
        namespace: public
        timeout: 30000
      client:
        namespace: public
        timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:192.168.254.128}
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 1
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  ai:
    # SiliconFlow 使用 OpenAI 兼容接口
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-cfcac66fbf4940db827317e5d968c8ca}
    openai:
      api-key: ${OPENAI_API_KEY:sk-aaddqevghkvnyosdrexrjgzjidokommfrshnhdtphagjityz}
      base-url: ${OPENAI_BASE_URL:https://api.siliconflow.cn/v1}
      chat:
        options:
          model: Qwen/Qwen2.5-7B-Instruct
      embedding:
        options:
          model: BAAI/bge-large-zh-v1.5

  rabbitmq:
    host: ${RABBITMQ_HOST:192.168.254.128}
    port: 5672
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:rabbitmq123}
    virtual-host: /

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

# AI配置
ai:
  conversation:
    max-messages: 100
    expiry-hours: 24
  agent:
    reflection:
      enabled: true
  vector:
    dimension: 1536
    hnsw:
      m: 16
      ef-construction: 200
      ef: 128
      max-items: 200000
  aiops:
    metrics:
      retention-ms: 900000
      persist-interval-ms: 60000
    detection:
      interval-ms: 60000
      window-ms: 300000
      latency-p95-threshold-ms: 5000
      error-rate-threshold: 0.1
      min-request-count: 10
    alert:
      cooldown-ms: 300000
  # 多模型配置 (SiliconFlow)
  models:
    openai:
      qwen3.6-plus:
        api-key: ${OPENAI_API_KEY:sk-aaddqevghkvnyosdrexrjgzjidokommfrshnhdtphagjityz}
        base-url: ${OPENAI_BASE_URL:https://api.siliconflow.cn/v1}
        model-alias: Qwen/Qwen2.5-7B-Instruct
        enabled: true
      glm-5:
        api-key: ${OPENAI_API_KEY:sk-aaddqevghkvnyosdrexrjgzjidokommfrshnhdtphagjityz}
        base-url: ${OPENAI_BASE_URL:https://api.siliconflow.cn/v1}
        model-alias: THUDM/GLM-4-32B-0414
        enabled: true
      kimi-k2.5:
        api-key: ${OPENAI_API_KEY:sk-aaddqevghkvnyosdrexrjgzjidokommfrshnhdtphagjityz}
        base-url: ${OPENAI_BASE_URL:https://api.siliconflow.cn/v1}
        model-alias: moonshot-v1-8k
        enabled: false
      MiniMax-M2.5:
        api-key: ${OPENAI_API_KEY:sk-aaddqevghkvnyosdrexrjgzjidokommfrshnhdtphagjityz}
        base-url: ${OPENAI_BASE_URL:https://api.siliconflow.cn/v1}
        model-alias: MiniMaxAI/MiniMax-Text-01
        enabled: false

# MinIO配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://192.168.254.128:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: doc-ai
  # bucket=permissionGroup1,permissionGroup2; another-bucket=groupA
  # JWT 中的 role 会作为默认权限组；可额外通过 permissionGroups/groups claim 扩展。
  bucket-permissions: "documents=admin,user;doc-ai=admin,user"
  bucket-permission-default-allow: false
  url:
    expiry: 3600
  recycle:
    expiry-days: 7
  delete:
    confirmation-timeout: 300

# 文档服务配置
document:
  service:
    url: http://localhost:8084

# 日志配置
logging:
  level:
    com.javaee.aiservice: debug
    org.springframework.ai: info
    org.springframework.security: info

# SpringDoc配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html