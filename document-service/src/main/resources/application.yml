spring:
  application:
    name: document

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:192.168.254.128}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:doc_ai}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 300000
      connection-timeout: 10000

  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      discovery:
        enabled: true
        server-addr: 192.168.254.128:8848
        namespace: public
        timeout: 30000
      client:
        namespace: public
        timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:192.168.254.128}
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 2
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  rabbitmq:
    host: ${RABBITMQ_HOST:192.168.254.128}
    port: 5672
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:rabbitmq123}
    virtual-host: /

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.javaee.documentservice.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8084
  servlet:
    context-path: /

logging:
  level:
    com.javaee.documentservice: debug
    org.springframework.security: info

custom:
  jwt:
    header: Authorization
    prefix: Bearer

# MinIO配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://192.168.254.128:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: document
  bucket-permissions: "document=admin,user"
  bucket-permission-default-allow: false

# 文件服务配置（Docker网络中使用服务名）
file:
  service:
    url: http://localhost:8082

document:
  schema:
    auto-migration:
      enabled: true
